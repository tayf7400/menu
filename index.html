<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1a3a2a">
<title>山區團購優惠組 · 產品介紹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1a3a2a;
  --green2:#2d5a43;
  --cream:#faf8f4;
  --ink:#1c1c1c;
  --ink2:#555;
  --ink3:#999;
  --line:#ebe7df;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;
  background:var(--cream);
  color:var(--ink);
  padding-bottom:90px;
  -webkit-font-smoothing:antialiased;
}

/* ── hero — full-bleed brand image ── */
.hero{
  position:relative;
  max-width:680px;
  margin:0 auto;
  line-height:0;
}
.hero-img{
  width:100%;
  display:block;
  border-radius:0 0 26px 26px;
}
@media(min-width:680px){.hero-img{border-radius:0 0 26px 26px}}
.hero .upd{
  position:absolute;
  left:50%;
  top:75.8%;
  transform:translate(-50%,-50%);
  font-size:12.5px;
  color:#e8dfc6;
  border:1px solid rgba(220,205,165,.55);
  background:rgba(10,28,18,.35);
  padding:4px 16px;
  border-radius:99px;
  letter-spacing:.05em;
  line-height:1.4;
  white-space:nowrap;
  backdrop-filter:blur(2px);
}
@media(max-width:380px){.hero .upd{font-size:11px;padding:3px 13px}}

/* published title + intro below the hero */
.sub-hero{
  max-width:680px;
  margin:0 auto;
  padding:20px 18px 0;
  text-align:center;
}
.sub-hero h1{
  font-family:'Noto Serif TC','Noto Sans TC',serif;
  font-size:21px;
  font-weight:900;
  color:var(--green);
  letter-spacing:.04em;
  line-height:1.35;
}
.sub-hero .intro{
  font-size:14px;
  color:var(--ink2);
  margin-top:8px;
  line-height:1.65;
  white-space:pre-line;
}

/* ── product grid ── */
.grid{
  max-width:680px;
  margin:0 auto;
  padding:20px 14px 10px;
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}

.pcard{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(26,58,42,.08);
  border:1px solid var(--line);
}
.pgallery{
  position:relative;
  width:100%;
  aspect-ratio:4/3;
  overflow:hidden;
  background:#f0ede7;
  touch-action:pan-y;
}
.ptrack{
  display:flex;
  width:100%;
  height:100%;
  will-change:transform;
}
.pslide{
  flex:0 0 100%;
  width:100%;
  height:100%;
}
.pimg{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
}
.pdots{
  position:absolute;
  bottom:9px;left:0;right:0;
  display:flex;
  justify-content:center;
  gap:6px;
  pointer-events:none;
}
.pdot{
  width:6px;height:6px;
  border-radius:50%;
  background:rgba(255,255,255,.55);
  box-shadow:0 0 3px rgba(0,0,0,.3);
  transition:all .2s;
}
.pdot.on{
  background:#fff;
  width:18px;
  border-radius:99px;
}
.pcount{
  position:absolute;
  top:9px;right:9px;
  background:rgba(0,0,0,.5);
  color:#fff;
  font-size:11px;
  font-weight:600;
  padding:2px 9px;
  border-radius:99px;
  pointer-events:none;
  backdrop-filter:blur(2px);
}
.pbody{padding:15px 17px 19px}
.pname{
  font-size:17.5px;
  font-weight:700;
  line-height:1.4;
  letter-spacing:.01em;
}
.punit{font-size:12px;font-weight:500;opacity:.85}
.pprice{
  display:inline-block;
  background:var(--green);
  color:#fff;
  font-size:15px;
  font-weight:900;
  padding:4px 15px;
  border-radius:99px;
  margin-top:9px;
  letter-spacing:.02em;
}
.pdesc{
  font-size:13.5px;
  color:var(--ink2);
  line-height:1.7;
  margin-top:10px;
  white-space:pre-line;
}

/* ── how to order footer card ── */
.foot{max-width:680px;margin:10px auto 0;padding:0 14px;text-align:center}
.how{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px 16px;
  font-size:14px;
  color:var(--ink2);
  line-height:1.75;
  box-shadow:0 2px 8px rgba(26,58,42,.06);
}
.how strong{color:var(--ink);font-size:15px}
.tag{font-size:11px;color:var(--ink3);margin-top:16px;letter-spacing:.05em}

/* ── sticky bottom hint bar ── */
.bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--green);
  color:#fff;
  text-align:center;
  padding:13px 16px calc(13px + env(safe-area-inset-bottom));
  font-size:14px;
  font-weight:700;
  letter-spacing:.03em;
  box-shadow:0 -3px 14px rgba(0,0,0,.18);
  z-index:50;
}

/* ── loading / empty states ── */
.state{
  min-height:70vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 24px;
}
.state .big{font-size:46px;margin-bottom:14px}
.state .t1{font-size:19px;font-weight:700;color:var(--ink)}
.state .t2{font-size:13.5px;color:var(--ink3);line-height:1.7;margin-top:8px}
.spinner{
  width:34px;height:34px;
  border:3.5px solid var(--line);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-bottom:18px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* gentle entry animation */
.pcard{animation:fadeUp .45s ease both}
.pcard:nth-child(2){animation-delay:.06s}
.pcard:nth-child(3){animation-delay:.12s}
.pcard:nth-child(4){animation-delay:.18s}
.pcard:nth-child(5){animation-delay:.24s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- loading state -->
<div class="state" id="loadingScreen">
  <div class="spinner"></div>
  <div class="t2">載入中…</div>
</div>

<!-- empty / unavailable state -->
<div class="state" id="emptyScreen" style="display:none">
  <div class="big">🍃</div>
  <div class="t1">暫時未有產品介紹</div>
  <div class="t2">請等待 WhatsApp 群組通知<br>Check back soon!</div>
</div>

<script>
/* ── CONFIG — same Apps Script as customer-order.html ── */
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbyaoVmbMkgmm6ODjdXHJGbP-KyNbFmxbIeCRDApbLd-jt3stNwxdSE8mrk16ufk8JcFqw/exec';
var CACHE_KEY='om_sc_pub_cache';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── view tracking: handle ?notrack=1 and log this visit ── */
window.hillsNoop=function(){};
(function(){
  var params=new URLSearchParams(window.location.search);
  if(params.get('notrack')==='1'){
    try{localStorage.setItem('sc_no_track','1');}catch(e){}
  }
  var optedOut=false;
  try{optedOut=localStorage.getItem('sc_no_track')==='1';}catch(e){}
  if(!optedOut){
    fetch(SCRIPT_URL+'?action=logview').catch(function(){
      var s=document.createElement('script');
      s.src=SCRIPT_URL+'?action=logview&callback=hillsNoop';
      document.head.appendChild(s);
    });
  }
})();

/* ── BOOT: fetch showcase — fetch first, JSONP fallback, then cache ── */
window.addEventListener('DOMContentLoaded',function(){

  /* show a small confirmation if this device just opted out */
  try{
    var p=new URLSearchParams(window.location.search);
    if(p.get('notrack')==='1'){
      var banner=document.createElement('div');
      banner.textContent='\u2713 This device will no longer be counted in page views';
      banner.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#1a3a2a;color:#fff;font-size:12px;padding:8px 16px;border-radius:99px;z-index:999;box-shadow:0 2px 10px rgba(0,0,0,.2)';
      document.body.appendChild(banner);
      setTimeout(function(){banner.style.transition='opacity .4s';banner.style.opacity='0';setTimeout(function(){banner.remove();},400);},2500);
    }
  }catch(e){}

  window.hillsShowcaseCallback=function(data){
    if(data&&data.items&&data.items.length){
      try{localStorage.setItem(CACHE_KEY,JSON.stringify(data));}catch(e){}
      render(data);
    } else {
      loadFromCache();
    }
  };

  fetch(SCRIPT_URL+'?action=getshowcase')
    .then(function(r){return r.json();})
    .then(function(data){
      if(data&&data.items&&data.items.length){
        try{localStorage.setItem(CACHE_KEY,JSON.stringify(data));}catch(e){}
        render(data);
      } else {
        loadFromCache();
      }
    })
    .catch(function(){
      /* fetch blocked (iOS CORS) — JSONP fallback */
      var s=document.createElement('script');
      s.src=SCRIPT_URL+'?action=getshowcase&callback=hillsShowcaseCallback';
      s.onerror=function(){loadFromCache();};
      document.head.appendChild(s);
    });
});

function loadFromCache(){
  var data=null;
  try{data=JSON.parse(localStorage.getItem(CACHE_KEY));}catch(e){}
  if(data&&data.items&&data.items.length) render(data);
  else showEmpty();
}

function showEmpty(){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('emptyScreen').style.display='flex';
}

function render(data){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
  document.getElementById('bottomBar').style.display='block';

  if(data.title && !/hills|sweets|nmc/i.test(data.title)){
    var tEl=document.getElementById('pg-title');
    tEl.textContent=data.title;
    tEl.style.display='block';
    document.title='山區團購優惠組 · '+data.title;
  }
  if(data.intro){
    var iEl=document.getElementById('pg-intro');
    iEl.textContent=data.intro;
    iEl.style.display='block';
  }
  if(data.publishedAt){
    var d=new Date(data.publishedAt);
    var uEl=document.getElementById('pg-upd');
    uEl.textContent='更新於 '+d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
    uEl.style.display='block';
  }

  var html='';
  data.items.forEach(function(it,ci){
    /* photos[] with fallback to single photo */
    var photos=it.photos&&it.photos.length?it.photos:(it.photo?[it.photo]:[]);
    var gallery='';
    if(photos.length){
      var slides=photos.map(function(p){
        return '<div class="pslide"><img class="pimg" src="'+p+'" alt="'+esc(it.name)+'" loading="lazy"></div>';
      }).join('');
      var dots='';
      if(photos.length>1){
        dots='<div class="pdots">'+photos.map(function(_,di){
          return '<span class="pdot'+(di===0?' on':'')+'"></span>';
        }).join('')+'</div>';
      }
      var counter=photos.length>1?'<div class="pcount"><span class="pcount-n">1</span>/'+photos.length+'</div>':'';
      gallery='<div class="pgallery" data-card="'+ci+'">'+
                '<div class="ptrack" id="ptrack-'+ci+'">'+slides+'</div>'+
                counter+dots+
              '</div>';
    }
    html+=
      '<div class="pcard">'+
        gallery+
        '<div class="pbody">'+
          '<div class="pname">'+esc(it.name)+'</div>'+
          (it.price!=null&&it.price!==''?'<div class="pprice">A$'+parseFloat(it.price).toFixed(2)+(it.unit?' <span class="punit">/ '+esc(it.unit).replace(/^\s*\/\s*/,'')+'</span>':'')+'</div>':'')+
          (it.desc?'<div class="pdesc">'+esc(it.desc)+'</div>':'')+
        '</div>'+
      '</div>';
  });
  document.getElementById('pg-grid').innerHTML=html;
  setupGalleries();
}

/* ── swipeable galleries ── */
function setupGalleries(){
  document.querySelectorAll('.pgallery').forEach(function(g){
    var track=g.querySelector('.ptrack');
    var slides=track.querySelectorAll('.pslide');
    if(slides.length<2) return;
    var dots=g.querySelectorAll('.pdot');
    var counter=g.querySelector('.pcount-n');
    var idx=0, startX=0, startY=0, dragging=false, horiz=null, cancelled=false;

    function go(i){
      idx=Math.max(0,Math.min(slides.length-1,i));
      track.style.transform='translateX('+(-idx*100)+'%)';
      dots.forEach(function(d,di){d.classList.toggle('on',di===idx);});
      if(counter) counter.textContent=idx+1;
    }

    g.addEventListener('touchstart',function(e){
      startX=e.touches[0].clientX;startY=e.touches[0].clientY;
      dragging=false;horiz=null;cancelled=false;
      track.style.transition='none';
    },{passive:true});

    g.addEventListener('touchmove',function(e){
      if(cancelled) return;
      var dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(horiz===null){
        if(Math.abs(dx)<6&&Math.abs(dy)<6) return;
        if(Math.abs(dy)>Math.abs(dx)){cancelled=true;return;}
        horiz=true;
      }
      e.preventDefault();
      dragging=true;
      var pct=(-idx*100)+(dx/g.offsetWidth*100);
      track.style.transform='translateX('+pct+'%)';
    },{passive:false});

    g.addEventListener('touchend',function(e){
      track.style.transition='transform .28s ease';
      if(!dragging||cancelled) return;
      var dx=e.changedTouches[0].clientX-startX;
      if(dx<-40) go(idx+1);
      else if(dx>40) go(idx-1);
      else go(idx);
    },{passive:true});

    /* click left/right half on desktop */
    g.addEventListener('click',function(e){
      if(e.sourceCapabilities&&e.sourceCapabilities.firesTouchEvents) return;
      var rect=g.getBoundingClientRect();
      if(e.clientX-rect.left > rect.width/2) go(idx+1); else go(idx-1);
    });
  });
}
</script>
